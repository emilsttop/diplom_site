{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<style>
    .login-container {
        max-width: 450px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .login-container h2 {
        text-align: center;
        color: #1a1a1a;
        margin-bottom: 30px;
        font-size: 28px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
        font-size: 14px;
    }
    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s;
        box-sizing: border-box;
    }
    .form-group input:focus {
        outline: none;
        border-color: #dc3545;
        box-shadow: 0 0 5px rgba(220, 53, 69, 0.3);
    }
    .btn-login {
        width: 100%;
        padding: 14px;
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }
    .btn-login:hover {
        background: #bb2d3b;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(220, 53, 69, 0.3);
    }
    .register-link {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #eee;
    }
    .register-link a {
        color: #dc3545;
        text-decoration: none;
        font-weight: bold;
    }
    .register-link a:hover {
        text-decoration: underline;
    }
    .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
    }

    /* Тёмная тема — текст белый */
body.dark .login-container h2,
body.dark .login-container label,
body.dark .login-container p,
body.dark .login-container a,
body.dark .login-container .register-link p,
body.dark .login-container .register-link a {
    color: #e0e0e0 !important;
}

/* Поля ввода в тёмной теме */
body.dark .login-container input {
    background: #2a2a3a;
    color: #e0e0e0;
    border-color: #dc3545;
}

body.dark .login-container input:focus {
    border-color: #ff6666;
    outline: none;
}

/* Сообщение об ошибке */
body.dark .error-message {
    background: #2a1a1a;
    color: #ff9999;
    border: 1px solid #dc3545;
}
</style>

<div class="login-container">
    <h2>🔐 Вход в аккаунт</h2>
    
    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>👤 Логин</label>
            <input type="text" name="username" required placeholder="Введите ваш логин">
        </div>
        <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" name="password" required placeholder="Введите пароль">
        </div>
        <button type="submit" class="btn-login">Войти</button>
    </form>
    
    <div class="register-link">
        <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
    </div>
</div>
{% endblock %}
