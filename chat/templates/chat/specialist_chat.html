{% extends 'base.html' %}

{% block title %}Чат с менеджером{% endblock %}

{% block content %}
<style>
    .chat-container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    .chat-header {
        background: linear-gradient(135deg, #1a1a1a 0%, #dc3545 100%);
        color: white;
        padding: 20px 25px;
    }
    .chat-header h3 {
        margin: 0 0 5px 0;
    }
    .chat-header p {
        margin: 0;
        opacity: 0.9;
        font-size: 14px;
    }
    .chat-messages {
        height: 500px;
        overflow-y: auto;
        padding: 20px;
        background: #f5f5f5;
    }
    .message {
        margin-bottom: 15px;
        padding: 10px 15px;
        border-radius: 12px;
        max-width: 70%;
        word-wrap: break-word;
    }
    .message-specialist {
        background: #fff0f0;
        border-left: 4px solid #dc3545;
        margin-right: auto;
    }
    .message-manager {
        background: #1a1a1a;
        color: white;
        margin-left: auto;
    }
    .message-manager strong {
        color: #dc3545;
    }
    .message small {
        font-size: 10px;
        opacity: 0.7;
        display: block;
        margin-top: 5px;
    }
    .chat-input {
        padding: 20px;
        background: white;
        border-top: 1px solid #eee;
        display: flex;
        gap: 10px;
    }
    .chat-input input {
        flex: 1;
        padding: 12px 15px;
        border-radius: 25px;
        border: 1px solid #ddd;
        font-size: 14px;
    }
    .chat-input input:focus {
        outline: none;
        border-color: #dc3545;
    }
    .chat-input button {
        padding: 12px 25px;
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
    }
    .chat-input button:hover {
        background: #bb2d3b;
    }
    .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 20px;
        background: #1a1a1a;
        color: white;
        text-decoration: none;
        border-radius: 25px;
    }
    .back-btn:hover {
        background: #dc3545;
    }
    body.dark .chat-container {
        background: #1e1e2e;
    }
    body.dark .chat-messages {
        background: #2a2a3a;
    }
    body.dark .message-specialist {
        background: #3a1a1a;
        color: #e0e0e0;
    }
    body.dark .chat-input {
        background: #1e1e2e;
        border-top-color: #3a3a4a;
    }
    body.dark .chat-input input {
        background: #2a2a3a;
        color: #e0e0e0;
        border-color: #dc3545;
    }
</style>

<a href="{% url 'specialist_dashboard' %}" class="back-btn">← Назад к панели</a>

<div class="chat-container">
    <div class="chat-header">
        <h3>💬 Чат с менеджером</h3>
        <p>Заказ №{{ order.id }} | Менеджер: {{ order.assigned_manager.get_full_name|default:order.assigned_manager.username }}</p>
    </div>
    <div class="chat-messages" id="chat-messages">
        <div style="text-align: center; padding: 20px;">Загрузка...</div>
    </div>
    <div class="chat-input">
        <input type="text" id="message-input" placeholder="Введите сообщение...">
        <button onclick="sendMessage()">📤 Отправить</button>
    </div>
</div>

<script>
    const orderId = {{ order.id }};
    const specialistId = {{ specialist.id }};
    let lastMessageCount = 0;
let initialLoadDone = false;

async function loadMessages() {
    const container = document.getElementById('chat-messages');
    try {
        const response = await fetch(`/chat/api/specialist/messages/${orderId}/${specialistId}/`);
        const data = await response.json();

        if (data.messages && data.messages.length > 0) {
            // При первой загрузке очищаем контейнер и заполняем заново
            if (!initialLoadDone) {
                container.innerHTML = '';
                for (const msg of data.messages) {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message message-${msg.sender_role}`;
                    messageDiv.innerHTML = `
                        <strong>${msg.sender_name}:</strong> ${msg.message}<br>
                        <small>${msg.created_at}</small>
                    `;
                    container.appendChild(messageDiv);
                }
                lastMessageCount = data.messages.length;
                initialLoadDone = true;
            } else {
                // При последующих загрузках добавляем только новые сообщения
                if (data.messages.length > lastMessageCount) {
                    const newMessages = data.messages.slice(lastMessageCount);
                    for (const msg of newMessages) {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = `message message-${msg.sender_role}`;
                        messageDiv.innerHTML = `
                            <strong>${msg.sender_name}:</strong> ${msg.message}<br>
                            <small>${msg.created_at}</small>
                        `;
                        container.appendChild(messageDiv);
                    }
                    lastMessageCount = data.messages.length;
                }
            }
            container.scrollTop = container.scrollHeight;
        } else {
            if (!initialLoadDone) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color:#999;">💬 Нет сообщений</div>';
                initialLoadDone = true;
            }
        }
    } catch(e) {
        console.error('Ошибка загрузки:', e);
        container.innerHTML = '<div style="text-align: center; padding: 20px; color: red;">❌ Ошибка загрузки</div>';
    }
}

    async function sendMessage() {
    const input = document.getElementById('message-input');
    const message = input.value.trim();
    if (!message) return;

    try {
        const formData = new FormData();
        formData.append('message', message);

        const response = await fetch(`/chat/api/specialist/send/${orderId}/${specialistId}/`, {
            method: 'POST',
            body: formData,
            headers: { 'X-CSRFToken': getCookie('csrftoken') }
        });
        
        if (response.ok) {
            input.value = '';
            // После отправки перезагружаем все сообщения заново
            initialLoadDone = false;
            lastMessageCount = 0;
            await loadMessages();
        } else {
            alert('Ошибка при отправке');
        }
    } catch(e) {
        alert('Ошибка при отправке');
    }
}

    function getCookie(name) {
        let value = null;
        if (document.cookie) {
            document.cookie.split(';').forEach(cookie => {
                let [key, val] = cookie.trim().split('=');
                if (key === name) value = decodeURIComponent(val);
            });
        }
        return value;
    }

    document.getElementById('message-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    loadMessages();
    setInterval(loadMessages, 3000);
</script>
{% endblock %}
